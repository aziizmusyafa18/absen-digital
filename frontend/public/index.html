<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absen Digital - Masuk</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css?v=1.2" rel="stylesheet">
</head>
<body class="login-body">
    <div class="login-card-pro">
        <!-- Header -->
        <div class="login-header-pro">
            <div class="login-logo-pro">
                <i class="bi bi-mortarboard-fill"></i>
            </div>
            <h2>Absen Digital</h2>
            <p>Sistem Absensi Terintegrasi SMK</p>
        </div>

        <!-- Login Form -->
        <form onsubmit="loginGuru(event)">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
                    <input type="text" class="form-control border-start-0 ps-0" id="guru-username" placeholder="Masukkan username" required>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                    <input type="password" class="form-control border-start-0 ps-0" id="guru-password" placeholder="Masukkan password" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-3 mb-4">
                <i class="bi bi-box-arrow-in-right me-2"></i>Masuk ke Sistem
            </button>
        </form>

        <!-- Demo Credentials -->
        <div class="p-3 bg-light rounded-3">
            <div class="d-flex align-items-center gap-2 mb-2">
                <i class="bi bi-info-circle text-primary"></i>
                <small class="fw-bold text-muted">Kredensial Demo</small>
            </div>
            <div class="mb-2">
                <div class="d-flex justify-content-between align-items-center">
                    <span class="badge badge-danger">ADMIN</span>
                    <code class="text-primary small">admin / admin123</code>
                </div>
            </div>
            <div>
                <div class="d-flex justify-content-between align-items-center">
                    <span class="badge badge-info">GURU</span>
                    <code class="text-primary small">sari / guru123</code>
                </div>
            </div>
        </div>

        <div id="alert-container" class="mt-3"></div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Login Script -->
    <script>
        const API_URL = '/api';

        async function loginGuru(event) {
            event.preventDefault();

            const username = document.getElementById('guru-username').value;
            const password = document.getElementById('guru-password').value;
            const submitBtn = event.target.querySelector('button[type="submit"]');

            // Disable button and show loading
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Memproses...';

            try {
                const response = await fetch(`${API_URL}/auth/login/guru`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('userData', JSON.stringify(data.user));

                    showAlert('success', 'Login berhasil! Mengalihkan...');

                    setTimeout(() => {
                        if (data.user.role === 'admin') {
                            window.location.href = 'admin.html';
                        } else {
                            window.location.href = 'guru.html';
                        }
                    }, 800);
                } else {
                    showAlert('danger', data.error || 'Username atau password salah');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Masuk ke Sistem';
                }
            } catch (error) {
                console.error('Login error:', error);
                showAlert('danger', 'Terjadi kesalahan sistem.');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Masuk ke Sistem';
            }
        }

        function showAlert(type, message) {
            const container = document.getElementById('alert-container');
            container.innerHTML = `
                <div class="alert alert-${type === 'danger' ? 'danger' : 'success'} border-0 shadow-sm d-flex align-items-center" role="alert">
                    <i class="bi bi-${type === 'danger' ? 'exclamation-triangle' : 'check-circle'}-fill me-2"></i>
                    <div>${message}</div>
                </div>
            `;
        }

        window.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            const user = localStorage.getItem('userData');
            if (token && user) {
                try {
                    const userData = JSON.parse(user);
                    if (userData.role === 'admin') window.location.href = 'admin.html';
                    else if (userData.role === 'guru') window.location.href = 'guru.html';
                } catch (e) { localStorage.clear(); }
            }
        });
    </script>
</body>
</html>
