<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absen Digital - Panel Guru</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css?v=1.2" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        .nav-tabs-modern { border: none; gap: 0.5rem; margin-bottom: 1.5rem; background: var(--bg-alt); padding: 0.4rem; border-radius: var(--radius-lg); flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .nav-tabs-modern::-webkit-scrollbar { height: 0; }
        .nav-tabs-modern .nav-link { border: none; border-radius: var(--radius-md); color: var(--text-muted); font-weight: 600; padding: 0.75rem 1.25rem; white-space: nowrap; flex-shrink: 0; }
        .nav-tabs-modern .nav-link.active { background: var(--bg-surface); color: var(--primary-color); box-shadow: var(--shadow-sm); }
        .camera-box { background: var(--primary-dark); border-radius: var(--radius-lg); position: relative; overflow: hidden; aspect-ratio: 4/3; display: flex; align-items: center; justify-content: center; color: #fff; }
        .camera-box video, .camera-box img { width: 100%; height: 100%; object-fit: cover; }
        .camera-overlay { position: absolute; bottom: 1.5rem; left: 0; right: 0; display: flex; justify-content: center; gap: 1rem; z-index: 10; }
        .siswa-card { display: flex; align-items: center; justify-content: space-between; padding: 1rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); margin-bottom: 0.75rem; background: var(--bg-surface); gap: 0.75rem; }
        .siswa-card .fw-bold { word-break: break-word; }
        @media (max-width: 576px) {
            .camera-box { aspect-ratio: 3/4; }
        }
    </style>
</head>
<body class="bg-main">
    <div class="app-container flex-column">
        <!-- Top Header -->
        <header class="top-bar border-0 shadow-sm" style="position: sticky; width: 100%; margin: 0; left: 0;">
            <div class="d-flex align-items-center gap-3">
                <div class="sidebar-logo" style="width: 36px; height: 36px;">
                    <i class="bi bi-mortarboard-fill text-white fs-5"></i>
                </div>
                <div class="page-info">
                    <h5 class="fw-bold m-0">Panel Guru</h5>
                    <p id="current-date" class="small text-muted">Memuat...</p>
                </div>
            </div>
            <div class="user-profile d-flex align-items-center gap-3">
                <div class="text-end d-none d-sm-block">
                    <div class="fw-bold" id="user-name">Guru</div>
                    <small class="text-muted" id="user-role">Pengajar</small>
                </div>
                <div class="dropdown">
                    <div class="stat-icon primary m-0" id="user-avatar" style="width:40px;height:40px;font-size:1rem;font-weight:700; cursor: pointer;" data-bs-toggle="dropdown">G</div>
                    <ul class="dropdown-menu dropdown-menu-end shadow-lg border-0">
                        <li><a class="dropdown-item text-danger" href="#" onclick="logout()"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
                    </ul>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="container-fluid p-3 p-md-4" style="max-width: 1000px; margin: 0 auto;">
            <!-- Tab Navigation -->
            <ul class="nav nav-tabs nav-tabs-modern" id="mainTabs" role="tablist">
                <li class="nav-item flex-grow-1 text-center">
                    <button class="nav-link active w-100" id="absen-tab" data-bs-toggle="tab" data-bs-target="#absen-panel"><i class="bi bi-pencil-square me-2"></i>Absensi & Jurnal</button>
                </li>
                <li class="nav-item flex-grow-1 text-center">
                    <button class="nav-link w-100" id="nilai-tab" data-bs-toggle="tab" data-bs-target="#nilai-panel"><i class="bi bi-journal-check me-2"></i>Input Nilai</button>
                </li>
            </ul>

            <div class="tab-content">
                <!-- Absensi Panel -->
                <div class="tab-pane fade show active" id="absen-panel">
                    <div class="card mb-3">
                        <div class="mb-3">
                            <label class="form-label">Pilih Kelas</label>
                            <select class="form-select" id="kelas-select-absen" onchange="loadSiswaForAbsen()">
                                <option value="">-- Pilih Kelas Mengajar --</option>
                            </select>
                        </div>
                    </div>

                    <div id="absen-section" class="d-none">
                        <!-- Jurnal Form -->
                        <div class="card mb-3">
                            <div class="card-header border-0 bg-transparent px-0 pb-3">
                                <h6 class="fw-bold m-0 text-primary"><i class="bi bi-journal-text me-2"></i>Detail Jurnal Pembelajaran</h6>
                            </div>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">Mata Pelajaran</label>
                                    <input type="text" class="form-control" id="mata-pelajaran" placeholder="Contoh: Pemrograman Dasar">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Materi Pembelajaran</label>
                                    <input type="text" class="form-control" id="materi" placeholder="Contoh: Pengenalan Array">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Jam Selesai</label>
                                    <input type="time" class="form-control" id="jam-selesai">
                                </div>
                                <input type="hidden" id="jam-mulai">
                            </div>
                        </div>

                        <!-- Camera Section -->
                        <div class="card mb-3">
                            <div class="card-header border-0 bg-transparent px-0 pb-3">
                                <h6 class="fw-bold m-0 text-primary"><i class="bi bi-camera me-2"></i>Foto Kegiatan</h6>
                            </div>
                            <div class="camera-box mb-3" id="camera-container">
                                <video id="camera-feed" playsinline class="d-none"></video>
                                <img id="photo-preview" class="d-none">
                                <div id="camera-placeholder" class="text-center">
                                    <i class="bi bi-camera fs-1 opacity-25 d-block mb-2"></i>
                                    <small class="text-white-50">Kamera belum aktif</small>
                                </div>
                                <div class="camera-overlay">
                                    <button class="btn btn-light btn-sm rounded-pill px-3 shadow" id="btn-start-camera" onclick="startCamera()"><i class="bi bi-camera-video me-1"></i> Aktifkan Kamera</button>
                                    <button class="btn btn-primary btn-sm rounded-pill px-4 shadow d-none" id="btn-take-photo" onclick="takePhoto()"><i class="bi bi-camera-fill me-1"></i> Ambil Foto</button>
                                    <button class="btn btn-outline-light btn-sm rounded-pill px-3 shadow d-none" id="btn-retake" onclick="resetCamera()"><i class="bi bi-arrow-counterclockwise"></i></button>
                                </div>
                            </div>
                            <canvas id="camera-canvas" class="d-none"></canvas>
                        </div>

                        <!-- Siswa List -->
                        <div class="card mb-3">
                            <div class="card-header border-0 bg-transparent px-0 pb-3">
                                <h6 class="fw-bold m-0 text-primary"><i class="bi bi-people me-2"></i>Daftar Kehadiran Siswa</h6>
                            </div>
                            <div id="siswa-list-absen"></div>
                            <button class="btn btn-primary w-100 py-3 mt-4 fs-6" onclick="submitAbsen()">
                                <i class="bi bi-send-check me-2"></i>Kirim Absensi & Jurnal
                            </button>
                        </div>
                    </div>

                    <!-- Riwayat -->
                    <div class="card">
                        <div class="card-header border-0 bg-transparent px-0 pb-3 d-flex justify-content-between align-items-center">
                            <h6 class="fw-bold m-0 text-muted"><i class="bi bi-history me-2"></i>Riwayat Absensi Terkini</h6>
                            <button class="btn btn-outline btn-sm" onclick="loadRiwayatAbsen()"><i class="bi bi-arrow-clockwise"></i></button>
                        </div>
                        <div class="table-responsive">
                            <table class="table-custom">
                                <thead>
                                    <tr>
                                        <th>Waktu</th>
                                        <th>Kelas</th>
                                        <th>Mapel</th>
                                        <th class="text-center">H</th>
                                        <th class="text-center">I</th>
                                        <th class="text-center">A</th>
                                    </tr>
                                </thead>
                                <tbody id="riwayat-absen-tbody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Nilai Panel -->
                <div class="tab-pane fade" id="nilai-panel">
                    <div class="card mb-3">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Pilih Kelas</label>
                                <select class="form-select" id="kelas-select-nilai" onchange="loadSiswaForNilai()">
                                    <option value="">-- Pilih Kelas --</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Mata Pelajaran</label>
                                <input type="text" class="form-control" id="nilai-mapel" placeholder="Mata Pelajaran">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Keterangan Penilaian</label>
                                <input type="text" class="form-control" id="nilai-keterangan" placeholder="Contoh: Ulangan Harian 1, Tugas Mandiri">
                            </div>
                        </div>
                    </div>

                    <div id="nilai-section" class="d-none">
                        <div class="card mb-3">
                            <div class="table-responsive">
                                <table class="table-custom">
                                    <thead><tr><th>Nama Siswa</th><th style="width: 120px;">Nilai</th></tr></thead>
                                    <tbody id="siswa-list-nilai"></tbody>
                                </table>
                            </div>
                            <button class="btn btn-primary w-100 py-3 mt-4" onclick="submitNilai()">
                                <i class="bi bi-cloud-upload me-2"></i>Simpan Nilai Siswa
                            </button>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header border-0 bg-transparent px-0 pb-3">
                            <h6 class="fw-bold m-0 text-muted"><i class="bi bi-file-earmark-excel me-2"></i>Export Rekap Nilai</h6>
                        </div>
                        <div class="row g-2 align-items-end">
                            <div class="col-md-3"><label class="small text-muted mb-1">Kelas</label><select id="export-kelas" class="form-select form-select-sm" onchange="updateMapelOptions()"></select></div>
                            <div class="col-md-3"><label class="small text-muted mb-1">Bulan</label><input type="month" id="export-bulan" class="form-control form-control-sm" onchange="updateMapelOptions()"></div>
                            <div class="col-md-4"><label class="small text-muted mb-1">Mapel</label><select id="export-mapel" class="form-select form-select-sm"></select></div>
                            <div class="col-md-2"><button class="btn btn-success btn-sm w-100" onclick="exportNilai()"><i class="bi bi-download"></i></button></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="notification" class="toast border-0 shadow-lg" role="alert" style="border-radius: var(--radius-md);">
            <div class="toast-body d-flex align-items-center gap-2 p-3">
                <i class="bi bi-check-circle-fill text-success fs-5" id="notification-icon"></i>
                <span id="notification-message" class="fw-medium"></span>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const token = localStorage.getItem('token');
        const userData = JSON.parse(localStorage.getItem('userData') || '{}');
        if (!token) window.location.href = 'index.html';

        document.getElementById('user-name').textContent = userData.nama || 'Guru';
        document.getElementById('user-role').textContent = userData.role === 'admin' ? 'Administrator' : 'Guru';
        document.getElementById('user-avatar').textContent = (userData.nama || 'G').charAt(0).toUpperCase();

        const toast = new bootstrap.Toast(document.getElementById('notification'));
        let capturedImageData = null;
        let cameraStream = null;

        document.addEventListener('DOMContentLoaded', () => {
            const now = new Date();
            document.getElementById('current-date').textContent = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long' });
            loadKelas();
            loadRiwayatAbsen();
            
            const expMonth = document.getElementById('export-bulan');
            expMonth.value = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}`;
        });

        async function loadKelas() {
            try {
                const res = await fetch('/api/guru/kelas', { headers: { 'Authorization': `Bearer ${token}` } });
                const classes = await res.json();
                const selects = ['kelas-select-absen', 'kelas-select-nilai', 'export-kelas'];
                selects.forEach(id => {
                    const el = document.getElementById(id);
                    el.innerHTML = '<option value="">-- Pilih Kelas --</option>';
                    classes.forEach(k => {
                        const opt = document.createElement('option');
                        opt.value = k.id; opt.textContent = k.nama;
                        if (k.mata_pelajaran) opt.dataset.mapel = k.mata_pelajaran;
                        el.appendChild(opt);
                    });
                });
            } catch (e) {}
        }

        async function loadSiswaForAbsen() {
            const id = document.getElementById('kelas-select-absen').value;
            if (!id) return document.getElementById('absen-section').classList.add('d-none');
            
            const sel = document.getElementById('kelas-select-absen').selectedOptions[0];
            document.getElementById('mata-pelajaran').value = sel.dataset.mapel || '';
            document.getElementById('jam-mulai').value = new Date().toTimeString().slice(0,5);
            document.getElementById('jam-selesai').value = new Date(Date.now() + 2*3600000).toTimeString().slice(0,5);

            try {
                const res = await fetch(`/api/guru/kelas/${id}/siswa`, { headers: { 'Authorization': `Bearer ${token}` } });
                const students = await res.json();
                const list = document.getElementById('siswa-list-absen');
                list.innerHTML = students.map(s => `
                    <div class="siswa-card">
                        <div class="fw-bold small">${s.nama}</div>
                        <select class="form-select form-select-sm w-auto border-0 bg-light" id="status-${s.id}">
                            <option value="hadir">Hadir</option>
                            <option value="izin">Izin</option>
                            <option value="tanpa_ket">Alpha</option>
                        </select>
                    </div>
                `).join('');
                document.getElementById('absen-section').classList.remove('d-none');
            } catch (e) {}
        }

        // Camera Logic
        async function startCamera() {
            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                const video = document.getElementById('camera-feed');
                video.srcObject = cameraStream;
                video.classList.remove('d-none');
                video.play();
                document.getElementById('camera-placeholder').classList.add('d-none');
                document.getElementById('btn-start-camera').classList.add('d-none');
                document.getElementById('btn-take-photo').classList.remove('d-none');
            } catch (e) { showNotification('Gagal akses kamera', 'error'); }
        }

        function takePhoto() {
            const video = document.getElementById('camera-feed');
            const canvas = document.getElementById('camera-canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            capturedImageData = canvas.toDataURL('image/jpeg', 0.8);
            
            video.classList.add('d-none');
            const preview = document.getElementById('photo-preview');
            preview.src = capturedImageData;
            preview.classList.remove('d-none');
            
            document.getElementById('btn-take-photo').classList.add('d-none');
            document.getElementById('btn-retake').classList.remove('d-none');
            
            if (cameraStream) cameraStream.getTracks().forEach(t => t.stop());
        }

        function resetCamera() {
            capturedImageData = null;
            document.getElementById('photo-preview').classList.add('d-none');
            document.getElementById('btn-retake').classList.add('d-none');
            startCamera();
        }

        async function submitAbsen() {
            if (!capturedImageData) return showNotification('Foto kegiatan wajib diambil', 'error');
            const body = {
                kelas_id: parseInt(document.getElementById('kelas-select-absen').value),
                siswa_list: Array.from(document.querySelectorAll('#siswa-list-absen select')).map(s => ({
                    siswa_id: parseInt(s.id.replace('status-', '')),
                    status: s.value
                })),
                jurnal_data: {
                    mata_pelajaran: document.getElementById('mata-pelajaran').value,
                    materi: document.getElementById('materi').value,
                    jam_mulai: document.getElementById('jam-mulai').value,
                    jam_selesai: document.getElementById('jam-selesai').value,
                    foto_kegiatan: capturedImageData
                }
            };
            try {
                const res = await fetch('/api/guru/absen', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                if (res.ok) {
                    showNotification('Absen & Jurnal berhasil disimpan');
                    location.reload();
                } else { showNotification('Gagal menyimpan absen', 'error'); }
            } catch (e) {}
        }

        async function loadRiwayatAbsen() {
            try {
                const res = await fetch('/api/guru/riwayat', { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                document.getElementById('riwayat-absen-tbody').innerHTML = data.slice(0, 5).map(j => {
                    const h = j.Absensis.filter(a => a.status === 'hadir').length;
                    const i = j.Absensis.filter(a => a.status === 'izin').length;
                    const a = j.Absensis.filter(a => a.status === 'tanpa_ket').length;
                    return `<tr><td>${j.jam_mulai}</td><td>${j.Kelas.nama}</td><td class="small">${j.mata_pelajaran}</td><td class="text-center text-success fw-bold">${h}</td><td class="text-center text-warning fw-bold">${i}</td><td class="text-center text-danger fw-bold">${a}</td></tr>`;
                }).join('');
            } catch (e) {}
        }

        // Nilai Section
        async function loadSiswaForNilai() {
            const id = document.getElementById('kelas-select-nilai').value;
            if (!id) return document.getElementById('nilai-section').classList.add('d-none');
            try {
                const res = await fetch(`/api/guru/kelas/${id}/siswa`, { headers: { 'Authorization': `Bearer ${token}` } });
                const students = await res.json();
                document.getElementById('siswa-list-nilai').innerHTML = students.map(s => `
                    <tr><td>${s.nama}</td><td><input type="number" class="form-control form-control-sm nilai-input" data-id="${s.id}" min="0" max="100"></td></tr>
                `).join('');
                document.getElementById('nilai-section').classList.remove('d-none');
            } catch (e) {}
        }

        async function submitNilai() {
            const body = {
                kelas_id: parseInt(document.getElementById('kelas-select-nilai').value),
                mata_pelajaran: document.getElementById('nilai-mapel').value,
                nilai_list: Array.from(document.querySelectorAll('.nilai-input')).map(i => ({
                    siswa_id: parseInt(i.dataset.id),
                    nilai: parseFloat(i.value) || 0,
                    keterangan: document.getElementById('nilai-keterangan').value
                }))
            };
            try {
                const res = await fetch('/api/guru/nilai', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                if (res.ok) {
                    showNotification('Nilai berhasil disimpan');
                    document.getElementById('nilai-section').classList.add('d-none');
                } else { showNotification('Gagal menyimpan nilai', 'error'); }
            } catch (e) {}
        }

        async function updateMapelOptions() {
            const kId = document.getElementById('export-kelas').value;
            const bln = document.getElementById('export-bulan').value;
            if (!kId || !bln) return;
            try {
                const res = await fetch(`/api/rekap/filter-options/mapel?kelas_id=${kId}&bulan=${bln}`, { headers: { 'Authorization': `Bearer ${token}` } });
                const result = await res.json();
                const el = document.getElementById('export-mapel');
                el.innerHTML = result.data.map(m => `<option value="${m}">${m}</option>`).join('');
            } catch (e) {}
        }

        function exportNilai() {
            const kId = document.getElementById('export-kelas').value;
            const bln = document.getElementById('export-bulan').value;
            const mpl = document.getElementById('export-mapel').value;
            if (!kId || !bln || !mpl) return showNotification('Lengkapi filter export', 'error');
            const url = `/api/rekap/export/nilai-bulanan/excel?kelas_id=${kId}&bulan=${bln}&tahun=${bln.split('-')[0]}&mata_pelajaran=${encodeURIComponent(mpl)}&token=${token}`;
            window.open(url, '_blank');
        }

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
        function showNotification(message, type = 'success') {
            document.getElementById('notification-message').textContent = message;
            document.getElementById('notification-icon').className = type === 'error' ? 'bi bi-x-circle-fill text-danger fs-5' : 'bi bi-check-circle-fill text-success fs-5';
            toast.show();
        }
    </script>
</body>
</html>
